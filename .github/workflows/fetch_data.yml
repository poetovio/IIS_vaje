name: Fetch data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  fetch_air:
    name: Fetch and pre-process air data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: DVC pull data
        run: |
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}
          dvc pull

      - name: Run fetch script
        run: uv run python src/data/fetch_data.py

      - name: Run pre-process script
        run: uv run python src/data/preprocess_air_data.py

      - name: Commit data changes
        run: |
          dvc add data
          dvc push

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git add data.dvc .gitignore

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update DVC-tracked data on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

      - name: Push changes
        run: git push origin HEAD:main