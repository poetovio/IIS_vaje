name: Fetch data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  fetch_air:
    name: Fetch and pre-process air data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure DVC credentials
        run: |
          uv run dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          uv run dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}

      - name: DVC pull data
        run: uv run dvc pull

      - name: Run DVC pipeline
        run: uv run dvc repro

      - name: Push DVC data
        run: uv run dvc push

      - name: Commit pipeline changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git add dvc.yaml dvc.lock params.yaml .gitignore

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update air data with DVC pipeline on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

      - name: Push changes
        run: git push origin HEAD:main