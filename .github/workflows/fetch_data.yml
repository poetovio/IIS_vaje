name: Fetch data on schedule

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pipx install uv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Setup Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Install dependencies
        run: uv sync --frozen

      - name: DVC setup remote
        run: |
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}

      - name: Run DVC pipeline
        run: |
          dvc pull
          dvc repro
          dvc push

      - name: Commit pipeline changes
        run: |
          git add dvc.lock
          git commit -m "Update pipeline outputs $(date -u)" || true

      - name: Push changes
        run: |
          git push origin HEAD:main

      - name: Prepare Netlify site
        run: |
          rm -rf site
          mkdir -p site/ge
          mkdir -p site/evidently

          cp -r gx/uncommitted/data_docs/local_site/* site/ge/ || true
          cp -r reports/data_testing/air/* site/evidently/ || true

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Data Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
              }
              h1 {
                margin-bottom: 20px;
              }
              ul {
                line-height: 2;
              }
              a {
                text-decoration: none;
                color: #0a66c2;
                font-weight: bold;
              }
            </style>
          </head>
          <body>
            <h1>Data Reports</h1>
            <ul>
              <li><a href="./ge/">Great Expectations Report</a></li>
              <li><a href="./evidently/">Evidently Reports</a></li>
            </ul>
          </body>
          </html>
          EOF

          cat > site/evidently/index.html <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Evidently Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
              }
              h1 {
                margin-bottom: 20px;
              }
              .grid {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
              }
              .button {
                display: inline-block;
                padding: 10px 16px;
                border-radius: 8px;
                background: #0a66c2;
                color: white;
                text-decoration: none;
                font-weight: bold;
              }
              .button:hover {
                background: #084f96;
              }
              .back {
                display: inline-block;
                margin-bottom: 20px;
                text-decoration: none;
                color: #0a66c2;
              }
            </style>
          </head>
          <body>
            <a class="back" href="../">← Back to Reports</a>
            <h1>Evidently Reports by Station</h1>
            <div class="grid">
          EOF

          shopt -s nullglob
          for file in site/evidently/*.html; do
            name=$(basename "$file")
            if [ "$name" != "index.html" ]; then
              station="${name%.html}"
              echo "        <a class=\"button\" href=\"./$name\">$station</a>" >> site/evidently/index.html
            fi
          done

          cat >> site/evidently/index.html <<'EOF'
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --prod --dir=site