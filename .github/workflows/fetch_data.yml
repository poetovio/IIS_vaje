name: Fetch data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch_air:
    name: Fetch and pre-process air data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run fetch script
        run: uv run python src/data/fetch_air_data.py

      - name: Run pre-process script
        run: uv run python src/data/preprocess_air_data.py

      - name: Commit data changes
        run: |
          git add data
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Updated raw air data on $(date -u '+%Y-%m-%d %H:%M:%S UTC') with GitHub Actions"
          fi

      - name: Push changes
        if: success()
        run: git push